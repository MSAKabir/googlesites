.btn {
  background-color: rgb(200,230,210);
  border: none;
  color: rgb(55,25,45);
  padding: 15px 32px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 16px;
  margin: 4px 2px;
  cursor: pointer;
}

 </head>

 <body>




      

<a  style = "float: right;" id="demo" href="" onclick="Switch()"><button class="btn">Switch</button></a>


<script>


function Switch() {
  var a;
   a = document.getElementById('demo');
  var txt = prompt("Press ' 1 ' for Casual View or ' 2 ' for Formal View", "1");
 
  if (txt === "2") {
   a.href = "https://msakabir.github.io/formal/";
}
  else if (txt === "1") {

   a.href = "https://msakabir.github.io/casual/";

}
  }




</script>
